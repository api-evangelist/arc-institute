aid: arc-institute
name: Arc Institute
description: >-
  Arc Institute is an independent nonprofit biomedical research organization
  headquartered in Palo Alto, California, co-founded in 2021 by Silvana
  Konermann (Executive Director), Patrick Hsu (Core Investigator), and Stripe
  co-founder Patrick Collison. With 300+ staff ("Arconauts") across 9 core
  laboratories and 5 technology centers, Arc develops AI foundation models
  for biology that span DNA, RNA, proteins, and single cells. Its flagship
  releases include Evo (Science, 2024) and Evo 2 (Nature, 2026) — DNA
  foundation models trained on trillions of nucleotides at single-nucleotide
  resolution with up to a 1-megabase context; STATE and Stack single-cell
  foundation models for cellular perturbation and in-context learning; the
  Arc Virtual Cell Atlas; the SRAgent LLM agents for bioinformatics; and the
  BINSEQ binary sequencing format. Models are released under Apache 2.0 on
  GitHub and Hugging Face, with hosted inference for Evo 2 available through
  NVIDIA BioNeMo and the NVIDIA build.nvidia.com API. Arc is funded by
  philanthropic donations from Patrick and John Collison, Vitalik Buterin,
  the Ron Conway family, Dustin Moskovitz, Daniel Gross, Elad Gil, and other
  technology benefactors; it does not sell APIs, SaaS, or models commercially.
